<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
<title>HBTUMitr</title>
<link rel="icon" type="image/png" href="./images/hbtumitr-logo.png"/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,300;0,500;0,700;1,300&family=Instrument+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
/* ── Reset & tokens ───────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:          #080e18;
  --surface:     rgba(14,22,38,0.92);
  --border:      rgba(255,255,255,0.07);
  --border-gold: rgba(210,170,80,0.25);
  --gold:        #d4aa50;
  --gold-lt:     #f0cf80;
  --gold-dim:    rgba(212,170,80,0.12);
  --teal:        #3ecfb2;
  --teal-dim:    rgba(62,207,178,0.1);
  --red:         #e8635a;
  --amber:       #f09040;
  --yellow:      #f0d050;
  --green:       #4cca88;
  --blue:        #5b9cf6;
  --text:        #e4ddd2;
  --muted:       #7a8fa8;
  --radius:      20px;
  --font-display:'Fraunces', serif;
  --font-body:   'Instrument Sans', sans-serif;
}

body{
  font-family:var(--font-body);
  background:var(--bg);
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:
    max(12px, env(safe-area-inset-top))
    max(12px, env(safe-area-inset-right))
    max(12px, env(safe-area-inset-bottom))
    max(12px, env(safe-area-inset-left));
  overflow:auto;
}

/* ── Ambient background ──────────────────────── */
body::before{
  content:'';
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 15% 10%, rgba(212,170,80,0.06) 0%, transparent 100%),
    radial-gradient(ellipse 50% 60% at 85% 90%, rgba(62,207,178,0.05) 0%, transparent 100%),
    radial-gradient(ellipse 80% 80% at 50% 50%, #080e18 0%, #030609 100%);
}

/* ── Chat shell ──────────────────────────────── */
#app{
  position:relative;z-index:1;
  width:min(460px, 100%);
  height:min(90vh, 760px);
  max-height:min(760px, calc(100dvh - 24px));
  min-height:0;
  display:flex;
  flex-direction:column;
  background:var(--surface);
  backdrop-filter:blur(24px);
  border:1px solid var(--border-gold);
  border-radius:var(--radius);
  box-shadow:0 40px 100px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.03) inset;
  animation:rise .6s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(30px);
}

@keyframes rise{to{opacity:1;transform:translateY(0)}}

/* ── Header ──────────────────────────────────── */
#hdr{
  padding:16px 18px 14px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:12px;
  min-width:0;
  flex-shrink:0;
}

.hdr-avatar{
  width:46px;height:46px;border-radius:10px;
  background:rgba(255,255,255,.95);
  border:1px solid var(--border-gold);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;
  overflow:hidden;
  box-shadow:0 0 0 3px var(--gold-dim);
  animation:pulse 3s ease-in-out infinite;
}
.hdr-avatar::before{
  content:"";
  width:100%;
  height:100%;
  background:url("./images/hbtumitr-logo.png") center/contain no-repeat;
}
@keyframes pulse{0%,100%{box-shadow:0 0 0 3px var(--gold-dim)}50%{box-shadow:0 0 0 7px rgba(212,170,80,.04)}}

.hdr-info h3{
  font-family:var(--font-display);font-size:.95rem;font-weight:500;color:var(--text);letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-sub{
  display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted);margin-top:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:#4cca88;animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.hdr-btns{margin-left:auto;display:flex;gap:6px;position:relative}
.ico-btn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);font-size:14px;transition:all .2s;
}
.ico-btn:hover{background:var(--gold-dim);color:var(--gold);border-color:var(--border-gold)}

.menu-wrap{position:relative}
.menu-panel{
  position:absolute;
  top:calc(100% + 8px);
  right:0;
  min-width:190px;
  padding:6px;
  border-radius:12px;
  border:1px solid var(--border-gold);
  background:rgba(12,18,30,.98);
  box-shadow:0 16px 36px rgba(0,0,0,.45);
  display:none;
  z-index:25;
}
.menu-panel.open{display:block;animation:pop .2s cubic-bezier(.16,1,.3,1) forwards}
.menu-item{
  width:100%;
  border:none;
  background:transparent;
  color:var(--text);
  text-align:left;
  border-radius:8px;
  padding:9px 10px;
  font-size:.78rem;
  font-family:var(--font-body);
  cursor:pointer;
  transition:background .18s,color .18s;
}
.menu-item:hover{
  background:rgba(212,170,80,.16);
  color:var(--gold-lt);
}

/* ── Messages ─────────────────────────────────── */
#msgs{
  flex:1;overflow-y:auto;
  min-height:0;
  padding:16px 14px 8px;
  display:flex;flex-direction:column;gap:4px;
  scroll-behavior:smooth;
}
#msgs::-webkit-scrollbar{width:3px}
#msgs::-webkit-scrollbar-thumb{background:rgba(212,170,80,.15);border-radius:3px}

.row{display:flex;align-items:flex-end;gap:8px;animation:pop .3s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(10px)}
.row.user{flex-direction:row-reverse;align-items:flex-start}
.row.bot{align-items:flex-start}
@keyframes pop{to{opacity:1;transform:translateY(0)}}

.av{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;margin-bottom:2px}
.row.user .av{margin-bottom:0;margin-top:2px}
.row.bot .av{margin-bottom:0;margin-top:2px}
.av.bot{
  background:rgba(255,255,255,.95);
  border:1px solid var(--border-gold);
  overflow:hidden;
}
.av.bot::before{
  content:"";
  width:100%;
  height:100%;
  background:url("./images/hbtumitr-logo.png") center/contain no-repeat;
}
.av.usr{background:linear-gradient(135deg,#2a5080,#0e1e30);font-size:11px}

.col{display:flex;flex-direction:column;max-width:min(82%, 100%)}
.col{min-width:0}
.row.user .col{align-items:flex-end}

.bbl{
  padding:9px 13px;border-radius:14px;
  font-size:.84rem;line-height:1.55;
  word-break:break-word;
}
.bbl.bot{
  background:linear-gradient(145deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.14);
  color:var(--text);
  border-bottom-left-radius:3px;
}
.bbl.user{
  background:linear-gradient(135deg,#d4aa50,#b9832d);
  color:#1a1205;font-weight:600;
  border:1px solid rgba(212,170,80,.45);
  border-bottom-right-radius:3px;
}

.bbl p{margin:.35rem 0}
.bbl ul,.bbl ol{margin:.4rem 0 .55rem 1.1rem}
.bbl li{margin:.2rem 0}
.bbl h1,.bbl h2,.bbl h3,.bbl h4{
  font-family:var(--font-display);
  color:var(--gold-lt);
  margin:.45rem 0 .35rem;
  line-height:1.25;
}
.bbl h1{font-size:1.02rem}
.bbl h2{font-size:.98rem}
.bbl h3{font-size:.92rem}
.bbl h4{font-size:.88rem}

.bbl a{
  color:#79d8ff;
  text-decoration:underline;
  text-underline-offset:2px;
  word-break:break-all;
}
.bbl a:hover{color:#9ee7ff}
.bbl a:visited{color:#7fc2ff}

.bbl .tbl-scroll{
  width:100%;
  overflow-x:auto;
  overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  margin-top:8px;
}

.bbl .tbl-scroll::-webkit-scrollbar{height:6px}
.bbl .tbl-scroll::-webkit-scrollbar-thumb{
  background:rgba(212,170,80,.28);
  border-radius:999px;
}

.bbl table{
  width:max-content;
  min-width:100%;
  border-collapse:collapse;
  margin-top:0;
  border:1px solid var(--border);
}

.bbl th,
.bbl td{
  border:1px solid var(--border);
  padding:6px 8px;
  text-align:left;
  vertical-align:top;
}

.bbl th{
  color:var(--gold-lt);
  background:rgba(212,170,80,.08);
}

.bbl code{
  background:rgba(255,255,255,.08);
  border:1px solid var(--border);
  border-radius:6px;
  padding:1px 5px;
  font-size:.78rem;
}

.msg-link{
  color:#79d8ff;
  text-decoration:underline;
  text-underline-offset:2px;
  word-break:break-all;
}
.msg-link:hover{color:#9ee7ff}
.msg-link:visited{color:#7fc2ff}
.ts{font-size:.62rem;color:var(--muted);opacity:.6;margin-top:3px;padding:0 4px}
.row.user .ts{text-align:right}

/* ── Typing ──────────────────────────────────── */
#typing{display:none;align-items:flex-end;gap:8px;padding:4px 14px 0;flex-shrink:0}
#typing.on{display:flex;animation:pop .3s forwards}
.tbl{
  background:rgba(255,255,255,.05);border:1px solid var(--border);
  border-radius:14px;border-bottom-left-radius:3px;
  padding:11px 14px;display:flex;gap:5px;align-items:center;
}
.td{width:6px;height:6px;border-radius:50%;background:var(--gold);opacity:.4;animation:tdot 1.2s ease-in-out infinite}
.td:nth-child(2){animation-delay:.2s}
.td:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,100%{transform:translateY(0);opacity:.4}50%{transform:translateY(-5px);opacity:1}}

/* ── Rich cards ──────────────────────────────── */

/* -- Prediction card -- */
.pred-card{
  margin-top:6px;
  border:1px solid var(--border-gold);
  border-radius:14px;overflow:hidden;
  font-size:.82rem;
  animation:pop .4s .05s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(10px);
}
.pred-meta{
  background:var(--gold-dim);
  border-bottom:1px solid var(--border-gold);
  padding:10px 14px;
  display:flex;gap:20px;flex-wrap:wrap;
}
.pred-meta-item{display:flex;flex-direction:column;gap:2px}
.pred-meta-label{font-size:.62rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.pred-meta-val{font-size:.82rem;font-weight:500;color:var(--gold-lt)}

.pred-group{padding:10px 14px 4px}
.pred-group-title{
  font-size:.68rem;text-transform:uppercase;letter-spacing:.1em;
  font-weight:500;margin-bottom:7px;display:flex;align-items:center;gap:6px;
}
.pred-branch-list{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.pred-branch{
  display:inline-flex;
  max-width:100%;
  padding:4px 10px;border-radius:20px;
  font-size:.76rem;font-weight:500;
  white-space:normal;
  word-break:break-word;
  border:1px solid;
}

/* chance colours */
.ch-vh{color:#4cca88;border-color:rgba(76,202,136,.3);background:rgba(76,202,136,.08)}
.ch-h {color:#5b9cf6;border-color:rgba(91,156,246,.3);background:rgba(91,156,246,.08)}
.ch-m {color:#f0d050;border-color:rgba(240,208,80,.3);background:rgba(240,208,80,.08)}
.ch-l {color:#f09040;border-color:rgba(240,144,64,.3);background:rgba(240,144,64,.08)}
.ch-vl{color:#e8635a;border-color:rgba(232,99,90,.3);background:rgba(232,99,90,.08)}

/* -- Seat card -- */
.seat-card{
  margin-top:6px;
  border:1px solid rgba(62,207,178,.2);
  border-radius:14px;overflow:hidden;font-size:.82rem;
  animation:pop .4s .05s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;transform:translateY(10px);
}
.seat-header{
  background:var(--teal-dim);border-bottom:1px solid rgba(62,207,178,.15);
  padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;
}
.seat-title{font-family:var(--font-display);font-size:.9rem;font-weight:500;color:var(--teal)}
.seat-total{font-size:.72rem;color:var(--muted)}
.seat-total span{color:var(--teal);font-weight:600;font-size:.85rem}

.seat-bars{padding:12px 14px 10px;display:flex;flex-direction:column;gap:8px}
.seat-row{display:flex;flex-direction:column;gap:3px}
.seat-row-top{display:flex;justify-content:space-between;align-items:center;gap:10px}
.seat-row-label{font-size:.74rem;color:var(--text);flex:1;min-width:0;word-break:break-word}
.seat-row-count{font-size:.72rem;color:var(--teal);font-weight:500}
.seat-bar-bg{height:5px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden}
.seat-bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--teal),#2a9a85);transition:width .6s cubic-bezier(.16,1,.3,1)}

/* -- Info / error card -- */
.info-card{
  margin-top:4px;padding:10px 13px;
  background:rgba(91,156,246,.06);
  border:1px solid rgba(91,156,246,.18);
  border-radius:12px;font-size:.81rem;color:var(--text);
  line-height:1.55;
}
.err-card{
  margin-top:4px;padding:10px 13px;
  background:rgba(232,99,90,.06);
  border:1px solid rgba(232,99,90,.2);
  border-radius:12px;font-size:.81rem;color:#f09090;
}

/* ── Counselling card ── */
.csl-card{
  margin-top:7px;
  border:1px solid rgba(212,170,80,.22);
  border-radius:13px;overflow:hidden;font-size:.82rem;
  animation:pop .4s .05s cubic-bezier(.16,1,.3,1) forwards;opacity:0;transform:translateY(10px);
}
.csl-hdr{
  background:linear-gradient(135deg,rgba(212,170,80,.15),rgba(212,170,80,.06));
  border-bottom:1px solid rgba(212,170,80,.18);
  padding:10px 14px;display:flex;align-items:center;gap:8px;
}
.csl-hdr-icon{font-size:1rem}
.csl-hdr-title{font-family:var(--font-display);font-size:.88rem;font-weight:500;color:var(--gold-lt)}
.csl-body{
  padding:12px 14px;color:var(--text);line-height:1.65;font-size:.81rem;
  white-space:pre-wrap;
  max-height:320px;overflow-y:auto;
}
.csl-body::-webkit-scrollbar{width:3px}
.csl-body::-webkit-scrollbar-thumb{background:rgba(212,170,80,.2);border-radius:3px}

/* -- Organizational setup card -- */
.org-card{
  margin-top:7px;
  border:1px solid rgba(91,156,246,.22);
  border-radius:13px;
  overflow:hidden;
  font-size:.82rem;
  animation:pop .4s .05s cubic-bezier(.16,1,.3,1) forwards;
  opacity:0;
  transform:translateY(10px);
}
.org-hdr{
  background:linear-gradient(135deg,rgba(91,156,246,.14),rgba(91,156,246,.06));
  border-bottom:1px solid rgba(91,156,246,.18);
  padding:10px 14px;
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
}
.org-hdr-left{
  min-width:0;
}
.org-hdr-title{
  font-family:var(--font-display);
  font-size:.9rem;
  font-weight:500;
  color:var(--blue);
  line-height:1.2;
}
.org-hdr-sub{
  font-size:.7rem;
  color:var(--muted);
  margin-top:3px;
  line-height:1.35;
}
.org-badge{
  flex-shrink:0;
  font-size:.64rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--blue);
  border:1px solid rgba(91,156,246,.25);
  background:rgba(91,156,246,.08);
  border-radius:999px;
  padding:4px 8px;
}
.org-body{
  padding:10px 14px 12px;
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:360px;
  overflow-y:auto;
}
.org-body::-webkit-scrollbar{width:3px}
.org-body::-webkit-scrollbar-thumb{background:rgba(91,156,246,.2);border-radius:3px}
.org-group{
  display:flex;
  flex-direction:column;
  gap:7px;
}
.org-group-title{
  font-size:.7rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--blue);
  font-weight:600;
}
.org-item{
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);
  border-radius:11px;
  padding:9px 10px;
  display:flex;
  flex-direction:column;
  gap:5px;
}
.org-item-main{
  display:flex;
  justify-content:space-between;
  gap:10px;
  align-items:flex-start;
}
.org-role{
  color:var(--gold-lt);
  font-weight:600;
  line-height:1.35;
  min-width:0;
  word-break:break-word;
}
.org-name{
  color:var(--text);
  text-align:right;
  line-height:1.35;
  flex-shrink:0;
  max-width:48%;
  word-break:break-word;
}
.org-meta{
  display:flex;
  flex-wrap:wrap;
  gap:8px 14px;
  font-size:.72rem;
  color:var(--muted);
  line-height:1.4;
}
.org-meta span{
  word-break:break-word;
}

/* ── Chips ────────────────────────────────────── */
#chips{
  padding:8px 12px 6px;
  display:flex;
  flex-direction:column;
  gap:6px;
  flex-shrink:0;
  border-top:1px solid rgba(212,170,80,.14);
  border-bottom:1px solid rgba(212,170,80,.12);
  background:linear-gradient(180deg,rgba(212,170,80,.06) 0%,rgba(11,19,34,.92) 38%,rgba(8,15,28,.96) 100%);
}

@media (hover: hover) and (pointer: fine){
  #chips{
    scrollbar-width:none;
    -ms-overflow-style:none;
  }

  #chips::-webkit-scrollbar{
    display:none;
  }
}

.chips-shell,
.chips-body,
.action-group,
.suggest-group{
  display:flex;
  flex-direction:column;
  gap:3px;
}

.chips-shell{
  border:1px solid rgba(212,170,80,.18);
  border-radius:12px;
  padding:8px;
  background:linear-gradient(160deg,rgba(14,24,43,.9),rgba(8,16,30,.92));
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04), 0 10px 24px rgba(0,0,0,.2);
}

.chips-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  padding-bottom:3px;
}

.chips-body{padding-top:0}

.chips-label,
.action-label,
.suggest-label{
  font-size:.66rem;
  letter-spacing:.08em;
  text-transform:uppercase;
  color:var(--muted);
}

.chips-label{
  color:var(--gold-lt);
}

.chips-toggle{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:28px;
  height:28px;
  padding:0;
  border-radius:50%;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.03);
  color:var(--muted);
  cursor:pointer;
  transition:all .18s;
}

.chips-toggle:hover{
  color:var(--text);
  border-color:rgba(255,255,255,.16);
  background:rgba(255,255,255,.06);
}

.chips-toggle .chev{
  width:8px;
  height:8px;
  border-right:1.6px solid currentColor;
  border-bottom:1.6px solid currentColor;
  transform:rotate(225deg) translateY(-1px);
  transition:transform .18s ease;
}

.chips-toggle[aria-expanded="false"] .chev{
  transform:rotate(45deg) translateY(-1px);
}

.chips-row,
.suggest-row{
  display:flex;
  flex-wrap:wrap;
  gap:5px;
}

.chips-body[hidden]{
  display:none;
}

.chip{
  padding:5px 10px;border-radius:20px;font-size:.75rem;
  font-family:var(--font-body);font-weight:500;cursor:pointer;
  transition:all .18s;
  animation:cpop .25s cubic-bezier(.34,1.56,.64,1) forwards;
  opacity:0;transform:scale(.85);
}
@keyframes cpop{to{opacity:1;transform:scale(1)}}

.chip.action{
  border:1px solid var(--border-gold);
  background:var(--gold-dim);color:var(--gold-lt);
}
.chip.action:hover{background:rgba(212,170,80,.22);border-color:rgba(212,170,80,.5);transform:translateY(-1px)}

.chip.suggest{
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);color:var(--muted);
}
.chip.suggest:hover{background:rgba(255,255,255,.07);color:var(--text);border-color:rgba(255,255,255,.15)}

.chip:active{transform:scale(.95)!important}

/* ── Input ────────────────────────────────────── */

<body>

<div id="app">

  <!-- Header -->
  <div id="hdr">
    <div class="hdr-avatar"></div>
    <div class="hdr-info">
      <h3>HBTUMitr (AI Assistant)</h3>
      <div class="hdr-sub"><div class="hdr-dot"></div>Beta Version</div>
    </div>
    <div class="hdr-btns">
      <div class="ico-btn" title="Clear chat" onclick="clearChat()">🗑</div>
      <div class="menu-wrap">
        <button id="menu-btn" type="button" class="ico-btn" title="Feedback" aria-label="Open feedback menu" aria-haspopup="true" aria-expanded="false">☰</button>
        <div id="feedback-menu" class="menu-panel" role="menu" aria-label="Feedback options">
          <button type="button" class="menu-item" role="menuitem" onclick="startPassiveFeedback('issue')">Report an issue</button>
          <button type="button" class="menu-item" role="menuitem" onclick="startPassiveFeedback('improvement')">Suggest improvement</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Messages -->
  <div id="msgs"></div>

  <!-- Typing indicator -->
  <div id="typing">
    <div class="av bot"></div>
    <div class="tbl"><div class="td"></div><div class="td"></div><div class="td"></div></div>
  </div>

  <!-- Action + suggestion chips -->
  <div id="chips"></div>

  <!-- Input -->
  <div id="inp-area">
    <div id="inp-wrap">
      <input id="inp" placeholder="Ask in English, Hindi, or Hinglish..." autocomplete="off"/>
    </div>
    <button id="send" onclick="sendMsg()" title="Send">➤</button>
  </div>

</div>

<script src="./config.js"></script>
<script>
/* ── State ────────────────────────────────────── */
const userId = "student_" + Math.floor(Math.random() * 100000);

// API base:
// - local dev: localhost -> local FastAPI
// - Vercel/Railway: set window.APP_CONFIG.API_BASE in config.js
// - same-origin fallback still works if frontend and backend share one domain
function getApiBase() {
  const configured = (window.APP_CONFIG?.API_BASE || "").trim();
  if (configured) {
    return configured.replace(/\/+$/, "");
  }

  if (window.location.hostname === "127.0.0.1" || window.location.hostname === "localhost") {
    return "http://127.0.0.1:8000";
  }

  return window.location.origin;
}

const API_BASE = getApiBase();

marked.setOptions({
  breaks: true,
  gfm: true,
});

const DEFAULT_ACTIONS = [
  { label: "📊 Predict My Branch",    value: "I want to predict my branch" },
  { label: "💺 Seat Distribution",    value: "Show seat distribution" },
  { label: "📋 Counselling Process",  value: "Explain the counselling process" },
];

let chipsExpanded = true;

const PLACEMENT_FOLLOWUP_CHIPS = [
  { label: "Placement Overview", value: "Show placement statistics year-wise", kind: "action" },
  { label: "Highest Package", value: "Show highest package year-wise", kind: "action" },
  { label: "Median Package", value: "Show median package year-wise", kind: "action" },
  { label: "Companies Visited", value: "Show companies visited year-wise", kind: "action" },
  { label: "Average Package", value: "Show average package year-wise", kind: "suggest" },
  { label: "Highest Package Companies", value: "Show highest package giving companies year-wise", kind: "suggest" },
];

function isPlacementResponse(data) {
  const subtopic = data?.data?.subtopic;
  const hasPlacementYears = Array.isArray(data?.data?.available_years);
  return hasPlacementYears || typeof subtopic === "string" && (
    subtopic.includes("package") ||
    subtopic.includes("placement") ||
    subtopic.includes("companies_visited") ||
    subtopic.includes("branch_wise") ||
    subtopic.includes("course_wise")
  );
}

/* ── Helpers ──────────────────────────────────── */
function now() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function $(id) { return document.getElementById(id); }

function escapeHtml(value) {
  return String(value ?? "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function linkifyEscapedHtml(escapedHtml) {
  const urlRegex = /((?:https?:\/\/|www\.)[^\s<]+)/gi;
  return escapedHtml.replace(urlRegex, (rawUrl) => {
    const trailing = (rawUrl.match(/[),.!?;:]+$/) || [""])[0];
    const cleanUrl = trailing ? rawUrl.slice(0, -trailing.length) : rawUrl;
    const href = /^www\./i.test(cleanUrl) ? `https://${cleanUrl}` : cleanUrl;
    return `<a class="msg-link" href="${href}" target="_blank" rel="noopener noreferrer">${cleanUrl}</a>${trailing}`;
  });
}

function safeMultilineHtml(value) {
  const escaped = escapeHtml(value).replace(/\n/g, "<br>");
  return linkifyEscapedHtml(escaped);
}

function openLinksInNewTab(rootEl) {
  if (!rootEl) return;
  rootEl.querySelectorAll("a[href]").forEach((link) => {
    link.target = "_blank";
    link.rel = "noopener noreferrer";
  });
}

function wrapScrollableTables(rootEl) {
  if (!rootEl) return;
  rootEl.querySelectorAll("table").forEach((table) => {
    if (table.parentElement && table.parentElement.classList.contains("tbl-scroll")) {
      return;
    }
    const wrapper = document.createElement("div");
    wrapper.className = "tbl-scroll";
    table.parentNode.insertBefore(wrapper, table);
    wrapper.appendChild(table);
  });
}

function scrollBottom() {
  const m = $("msgs");
  m.scrollTop = m.scrollHeight;
}

/* ── Add plain text message bubble ──────────────── */
function addBubble(html, side) {
  const m = $("msgs");
  const row = document.createElement("div");
  row.className = `row ${side}`;

  const av = document.createElement("div");
  av.className = `av ${side === "bot" ? "bot" : "usr"}`;
  av.textContent = side === "bot" ? "" : "👤";

  const col = document.createElement("div");
  col.className = "col";

  const bbl = document.createElement("div");
  bbl.className = `bbl ${side}`;
  if (side === "bot") {
    bbl.innerHTML = marked.parse(String(html || ""));
    openLinksInNewTab(bbl);
    wrapScrollableTables(bbl);
  } else {
    bbl.textContent = String(html || "");
  }

  const ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = now();

  col.appendChild(bbl);
  col.appendChild(ts);

  if (side === "user") {
    row.appendChild(col);
    row.appendChild(av);
  } else {
    row.appendChild(av);
    row.appendChild(col);
  }

  m.appendChild(row);
  scrollBottom();
  return col; // so we can append rich cards to it
}

/* ── Rich card builders ──────────────────────── */

const CHANCE_LEVELS = ["Very High", "High", "Moderate", "Low", "Very Low"];
const CHANCE_CSS    = { "Very High": "ch-vh", "High": "ch-h", "Moderate": "ch-m", "Low": "ch-l", "Very Low": "ch-vl" };
const CHANCE_ICONS  = { "Very High": "🔵", "High": "🟢", "Moderate": "🟡", "Low": "🟠", "Very Low": "🔴" };

function buildPredictionCard(data) {
  const card = document.createElement("div");
  card.className = "pred-card";

  // Meta row
  const meta = document.createElement("div");
  meta.className = "pred-meta";

  const fields = [
    ["Rank",     data.rank],
    ["Category", data.category],
    ["Quota",    data.quota],
  ];

  fields.forEach(([label, val]) => {
    const item = document.createElement("div");
    item.className = "pred-meta-item";

    const labelEl = document.createElement("span");
    labelEl.className = "pred-meta-label";
    labelEl.textContent = label;

    const valueEl = document.createElement("span");
    valueEl.className = "pred-meta-val";
    valueEl.textContent = String(val ?? "");

    item.appendChild(labelEl);
    item.appendChild(valueEl);
    meta.appendChild(item);
  });

  card.appendChild(meta);

  // Branch groups
  const branches = data.branches || {};
  CHANCE_LEVELS.forEach(level => {
    if (!branches[level] || branches[level].length === 0) return;
    const css = CHANCE_CSS[level];
    const icon = CHANCE_ICONS[level];

    const grp = document.createElement("div");
    grp.className = "pred-group";
    grp.innerHTML = `<div class="pred-group-title ${css}">${icon} ${level} Chance</div>`;

    const list = document.createElement("div");
    list.className = "pred-branch-list";
    branches[level].forEach(b => {
      const tag = document.createElement("span");
      tag.className = `pred-branch ${css}`;
      tag.textContent = b;
      list.appendChild(tag);
    });

    grp.appendChild(list);
    card.appendChild(grp);
  });

  return card;
}

function buildSeatCard(data) {
  if (!data || !data.branch) return null;
  const card = document.createElement("div");
  card.className = "seat-card";
  const safeBranch = escapeHtml(data.branch);
  const safeYear = escapeHtml(data.year);
  const safeTotalSeats = escapeHtml(data.total_seats);
  data = { ...data, branch: safeBranch, year: safeYear, total_seats: safeTotalSeats };

  card.innerHTML = `
    <div class="seat-header">
      <span class="seat-title">${data.branch} — ${data.year}</span>
      <span class="seat-total">Total <span>${data.total_seats}</span> seats</span>
    </div>`;

  const bars = document.createElement("div");
  bars.className = "seat-bars";

  const dist = data.quota_distribution || {};
  const numericCounts = Object.values(dist)
    .map((value) => Number(value))
    .filter((value) => Number.isFinite(value));
  const max = numericCounts.length ? Math.max(...numericCounts, 1) : 1;

  Object.entries(dist).forEach(([quota, count]) => {
    const safeQuota = escapeHtml(quota);
    const numericCount = Number(count);
    const safeCount = Number.isFinite(numericCount) ? numericCount : 0;
    const pct = Math.max(0, Math.min(100, Math.round((safeCount / max) * 100)));
    bars.insertAdjacentHTML("beforeend", `
      <div class="seat-row">
        <div class="seat-row-top">
          <span class="seat-row-label">${safeQuota}</span>
          <span class="seat-row-count">${safeCount} seats</span>
        </div>
        <div class="seat-bar-bg">
          <div class="seat-bar-fill" style="width:0%" data-target="${pct}%"></div>
        </div>
      </div>`);
  });

  card.appendChild(bars);

  // Animate bars after DOM insert
  requestAnimationFrame(() => {
    card.querySelectorAll(".seat-bar-fill").forEach(el => {
      el.style.width = el.dataset.target;
    });
  });

  return card;
}

/* ── Rich card: counselling info ── */
function buildCounsellingCard(data, message) {
  const card = document.createElement("div");
  card.className = "csl-card";

  const title = data?.title || "Counselling Info";

  // Icon mapping per subtopic
  const icons = {
    overview: "📋", registration: "📝", round1: "🔵", round2: "🟢",
    round3: "🟡", round4: "🟠", round5: "🔴",
    freeze_float: "🔒", refund: "💰", documents: "📄"
  };
  const subtopic = data?.subtopic || "overview";
  const safeTitle = escapeHtml(title);
  const safeMessage = safeMultilineHtml(message);
  const icon = icons[subtopic] || "📋";

  card.innerHTML = `
    <div class="csl-hdr">
      <span class="csl-hdr-icon">${icon}</span>
      <span class="csl-hdr-title">${safeTitle}</span>
    </div>
    <div class="csl-body">${safeMessage}</div>`;

  return card;
}

function buildOrganizationalSetupCard(data) {
  const card = document.createElement("div");
  card.className = "org-card";

  const matches = Array.isArray(data?.matches) ? data.matches : [];
  const source = data?.source || "Organizational Setup";
  const badgeText = matches.length > 1 ? `${matches.length} entries` : "1 entry";

  const groups = new Map();
  matches.forEach((item) => {
    const key = item?.group || "Office";
    if (!groups.has(key)) {
      groups.set(key, []);
    }
    groups.get(key).push(item);
  });

  const body = Array.from(groups.entries()).map(([groupName, rows]) => {
    const itemsHtml = rows.map((item) => {
      const role = escapeHtml(item?.role || "");
      const name = escapeHtml(item?.name || "");
      const email = item?.email ? `Email: ${escapeHtml(item.email)}` : "";
      const contact = item?.contact ? `Contact: ${escapeHtml(item.contact)}` : "";
      const meta = [email, contact].filter(Boolean).map((v) => `<span>${v}</span>`).join("");
      return `
        <div class="org-item">
          <div class="org-item-main">
            <div class="org-role">${role}</div>
            <div class="org-name">${name}</div>
          </div>
          ${meta ? `<div class="org-meta">${meta}</div>` : ""}
        </div>`;
    }).join("");

    return `
      <div class="org-group">
        <div class="org-group-title">${escapeHtml(groupName)}</div>
        ${itemsHtml}
      </div>`;
  }).join("");

  card.innerHTML = `
    <div class="org-hdr">
      <div class="org-hdr-left">
        <div class="org-hdr-title">HBTU Organizational Setup</div>
        <div class="org-hdr-sub">${escapeHtml(source)}</div>
      </div>
      <div class="org-badge">${badgeText}</div>
    </div>
    <div class="org-body">${body}</div>`;

  return card;
}

/* ── Render a full bot response ──────────────── */
function renderBotResponse(data) {
  const type    = data.type || "unknown";
  const message = data.message || "I'm here to help.";
  const hasMarkdownTable = /\|\s*[^\n|]+\s*\|/.test(message);

  // Streaming responses get typewriter effect (no card)
  if (type === "stream") {
    renderStreamResponse(data);
    return;
  }

  const col = addBubble(message, "bot");

  // Attach rich card depending on response type
  if (type === "prediction" && data.data && data.data.branches) {
    const card = buildPredictionCard(data.data);
    col.insertBefore(card, col.querySelector(".ts"));
  }

  if (type === "organizational_setup" && data.data && Array.isArray(data.data.matches)) {
    const card = buildOrganizationalSetupCard(data.data);
    col.querySelector(".bbl").style.display = "none";
    col.insertBefore(card, col.querySelector(".ts"));
  }

  if (type === "seats" && data.data && data.data.branch && !hasMarkdownTable) {
    const card = buildSeatCard(data.data);
    if (card) col.insertBefore(card, col.querySelector(".ts"));
  }

  if (type === "info") {
    const card = document.createElement("div");
    card.className = "info-card";
    card.innerHTML = safeMultilineHtml(message);
    col.querySelector(".bbl").style.display = "none";
    col.insertBefore(card, col.querySelector(".ts"));
  }

  if (type === "error") {
    const card = document.createElement("div");
    card.className = "err-card";
    card.textContent = message;
    col.querySelector(".bbl").style.display = "none";
    col.insertBefore(card, col.querySelector(".ts"));
  }

  renderChips(data);
  scrollBottom();
}

/* ── Render chips helper ─────────────────────── */
function buildChipsShell(chipsEl) {
  chipsEl.innerHTML = "";

  const shell = document.createElement("div");
  shell.className = "chips-shell";

  const head = document.createElement("div");
  head.className = "chips-head";

  const label = document.createElement("div");
  label.className = "chips-label";
  label.textContent = "Quick options";

  const toggle = document.createElement("button");
  toggle.type = "button";
  toggle.className = "chips-toggle";
  toggle.innerHTML = `<span class="chev" aria-hidden="true"></span>`;

  const body = document.createElement("div");
  body.className = "chips-body";

  const syncToggle = () => {
    toggle.setAttribute("aria-expanded", chipsExpanded ? "true" : "false");
    toggle.setAttribute("aria-label", chipsExpanded ? "Collapse quick options" : "Expand quick options");
    toggle.title = chipsExpanded ? "Collapse quick options" : "Expand quick options";
    body.hidden = !chipsExpanded;
  };

  toggle.onclick = () => {
    chipsExpanded = !chipsExpanded;
    syncToggle();
  };

  syncToggle();
  head.appendChild(label);
  head.appendChild(toggle);
  shell.appendChild(head);
  shell.appendChild(body);
  chipsEl.appendChild(shell);

  return body;
}

function showDefaultChips() {
  const chipsEl = $("chips");
  const body = buildChipsShell(chipsEl);

  const actionGroup = document.createElement("div");
  actionGroup.className = "action-group";

  const actionLabel = document.createElement("div");
  actionLabel.className = "action-label";
  actionLabel.textContent = "Actions";

  const row = document.createElement("div");
  row.className = "chips-row";

  DEFAULT_ACTIONS.forEach((a, i) => {
    const c = document.createElement("div");
    c.className = "chip action";
    c.textContent = a.label;
    c.style.animationDelay = `${i * 55}ms`;
    c.onclick = () => sendMsg(a.value);
    row.appendChild(c);
  });

  actionGroup.appendChild(actionLabel);
  actionGroup.appendChild(row);
  body.appendChild(actionGroup);
}

function renderChips(data) {
  const chipsEl = $("chips");
  const actions = [...(data.actions || [])];
  const suggestions = [...(data.suggestions || [])];

  if (isPlacementResponse(data)) {
    const existingValues = new Set([
      ...actions.map((a) => String(a?.value || a?.label || "").toLowerCase()),
      ...suggestions.map((s) => String(s || "").toLowerCase()),
    ]);

    PLACEMENT_FOLLOWUP_CHIPS.forEach((chip) => {
      const key = String(chip.value || chip.label || "").toLowerCase();
      if (!key || existingValues.has(key)) return;

      if (chip.kind === "action") {
        actions.push({ label: chip.label, value: chip.value });
      } else {
        suggestions.push(chip.value);
      }
      existingValues.add(key);
    });
  }

  if (actions.length === 0 && suggestions.length === 0) {
    showDefaultChips();
    return;
  }

  const body = buildChipsShell(chipsEl);

  if (actions.length > 0) {
    const actionGroup = document.createElement("div");
    actionGroup.className = "action-group";

    const actionLabel = document.createElement("div");
    actionLabel.className = "action-label";
    actionLabel.textContent = "Actions";

    const actionsRow = document.createElement("div");
    actionsRow.className = "chips-row";

    actions.forEach((a, i) => {
      const c = document.createElement("div");
      c.className = "chip action";
      c.textContent = a.label;
      c.style.animationDelay = `${i * 55}ms`;
      c.onclick = () => sendMsg(a.value || a.label);
      actionsRow.appendChild(c);
    });

    actionGroup.appendChild(actionLabel);
    actionGroup.appendChild(actionsRow);
    body.appendChild(actionGroup);
  }

  if (suggestions.length > 0) {
    const suggestGroup = document.createElement("div");
    suggestGroup.className = "suggest-group";

    const suggestLabel = document.createElement("div");
    suggestLabel.className = "suggest-label";
    suggestLabel.textContent = "Suggestions";

    const suggestRow = document.createElement("div");
    suggestRow.className = "suggest-row";

    suggestions.forEach((s, i) => {
      const c = document.createElement("div");
      c.className = "chip suggest";
      c.textContent = s;
      c.style.animationDelay = `${(actions.length + i) * 55}ms`;
      c.onclick = () => sendMsg(s);
      suggestRow.appendChild(c);
    });

    suggestGroup.appendChild(suggestLabel);
    suggestGroup.appendChild(suggestRow);
    body.appendChild(suggestGroup);
  }
}

function focusInputIfDesktop() {
  const isDesktopPointer = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
  if (isDesktopPointer) {
    $("inp").focus();
  }
}

function closeFeedbackMenu() {
  const menu = $("feedback-menu");
  const btn = $("menu-btn");
  if (!menu || !btn) return;
  menu.classList.remove("open");
  btn.setAttribute("aria-expanded", "false");
}

function startPassiveFeedback(type) {
  const inp = $("inp");
  const templates = {
    issue: "Report an issue: ",
    improvement: "Suggest improvement: ",
  };
  inp.value = templates[type] || "";
  closeFeedbackMenu();
  inp.focus();
  inp.setSelectionRange(inp.value.length, inp.value.length);
}

/* ── Streaming typewriter for counselling replies ── */
async function renderStreamResponse(data) {
  const message = data.message || "";

  // Create the bubble structure with empty content
  const m = $("msgs");
  const row = document.createElement("div");
  row.className = "row bot";
  row.style.opacity = "1";
  row.style.transform = "translateY(0)";

  const av = document.createElement("div");
  av.className = "av bot";

  const col = document.createElement("div");
  col.className = "col";

  const bbl = document.createElement("div");
  bbl.className = "bbl bot";
  bbl.innerHTML = "";

  const ts = document.createElement("div");
  ts.className = "ts";
  ts.textContent = now();

  col.appendChild(bbl);
  col.appendChild(ts);
  row.appendChild(av);
  row.appendChild(col);
  m.appendChild(row);
  scrollBottom();

  // Stream characters with typewriter effect
  const CHARS_PER_TICK = 3;
  const TICK_MS = 12;
  let i = 0;

  await new Promise(resolve => {
    const timer = setInterval(() => {
      i = Math.min(i + CHARS_PER_TICK, message.length);
      const chunk = message.substring(0, i);
      bbl.innerHTML = marked.parse(chunk);
      openLinksInNewTab(bbl);
      wrapScrollableTables(bbl);
      scrollBottom();

      if (i >= message.length) {
        clearInterval(timer);
        resolve();
      }
    }, TICK_MS);
  });

  // Final pass: render full markdown after streaming completes.
  bbl.innerHTML = marked.parse(message);
  openLinksInNewTab(bbl);
  wrapScrollableTables(bbl);

  // Show chips after stream finishes
  renderChips(data);
  scrollBottom();

  $("send").disabled = false;
  focusInputIfDesktop();
}

/* ── Send message ─────────────────────────────── */
async function sendMsg(override = null) {
  const inp  = $("inp");
  const text = override || inp.value.trim();
  if (!text) return;

  $("chips").innerHTML = "";
  inp.value = "";
  $("send").disabled = true;

  addBubble(text, "user");

  // Typing indicator
  const t = $("typing");
  t.classList.add("on");
  scrollBottom();

  await new Promise(r => setTimeout(r, 600 + Math.random() * 500));

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ user_id: userId, user_message: text }),
    });

    const data = await res.json();
    t.classList.remove("on");

    // For stream type, renderStreamResponse handles re-enabling send
    if (data.type === "stream") {
      renderBotResponse(data);
      return;
    }

    renderBotResponse(data);

  } catch (err) {
    t.classList.remove("on");
    renderBotResponse({
      type: "error",
      message: "Connection failed. Please check the server and try again.",
      actions: [],
      suggestions: [],
    });
  }

  $("send").disabled = false;
  focusInputIfDesktop();
}

/* ── UI controls ─────────────────────────────── */
function clearChat() {
  const m = $("msgs");
  m.innerHTML = "";
  closeFeedbackMenu();
  chipsExpanded = true;
  addWelcome();
  showDefaultChips();
}

function addWelcome() {
  const m = $("msgs");
  const w = document.createElement("div");
  w.className = "welcome";
  w.innerHTML = `
    <h4>Namaste! I'm HBTUMitr. 🙏</h4>
    <p>Ask me in English, Hindi, or Hinglish about HBTU admissions, fees, seats, placements, or counselling steps.</p>`;
  m.appendChild(w);
}

/* ── Init ─────────────────────────────────────── */
$("inp").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

window.addEventListener("DOMContentLoaded", () => {
  const menuBtn = $("menu-btn");
  const menuPanel = $("feedback-menu");

  if (menuBtn && menuPanel) {
    menuBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      const isOpen = menuPanel.classList.contains("open");
      if (isOpen) {
        closeFeedbackMenu();
        return;
      }
      menuPanel.classList.add("open");
      menuBtn.setAttribute("aria-expanded", "true");
    });

    menuPanel.addEventListener("click", (e) => {
      e.stopPropagation();
    });

    document.addEventListener("click", () => {
      closeFeedbackMenu();
    });

    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape") {
        closeFeedbackMenu();
      }
    });
  }

  addWelcome();
  showDefaultChips();
  focusInputIfDesktop();
  return;
  setTimeout(() => {
    renderBotResponse({
      type: "question",
      message: "Namaste! I'm HBTUMitr. 🙏\n\nI'm here to simplify your HBTU admission process. Ask me about fees structure, seat info, or counselling steps!",
      actions: DEFAULT_ACTIONS,
      suggestions: [],
    });
  }, 650);
});
